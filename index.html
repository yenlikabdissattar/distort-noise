<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISTORT NOISE — iPhone Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #d4160a;
    --offwhite: #ede8dc;
    --phone-w: 430px;
    --phone-h: 932px;
  }

  body {
    background: #080808;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    gap: 28px;
    /* subtle noise texture */
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  }

  /* ── Labels ── */
  .label-top {
    font-family: 'Oswald', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--offwhite);
    line-height: 1;
  }
  .label-top em {
    color: var(--red);
    font-style: normal;
  }

  .label-bottom {
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #383838;
  }

  /* ── iPhone 15 Pro frame ── */
  .iphone-wrap {
    position: relative;
    /* outer titanium border */
    background: linear-gradient(145deg,
      #5a5a5a 0%, #3a3a3a 15%,
      #4e4e4e 30%, #2c2c2c 50%,
      #4a4a4a 70%, #3a3a3a 85%,
      #565656 100%
    );
    width: calc(var(--phone-w) + 10px);
    height: calc(var(--phone-h) + 10px);
    border-radius: 62px;
    padding: 5px;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 60px 120px rgba(0,0,0,0.95),
      0 30px 60px rgba(0,0,0,0.7),
      0 0 40px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  /* inner body */
  .iphone {
    position: relative;
    width: var(--phone-w);
    height: var(--phone-h);
    background: #111;
    border-radius: 58px;
    overflow: hidden;
  }

  /* screen glass */
  .iphone-screen {
    position: absolute;
    inset: 0;
    border-radius: 58px;
    overflow: hidden;
    background: #000;
  }

  /* glass sheen on top-left */
  .iphone-screen::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 55%; height: 40%;
    background: linear-gradient(135deg,
      rgba(255,255,255,0.07) 0%,
      transparent 60%
    );
    border-radius: 58px 0 0 0;
    pointer-events: none;
    z-index: 20;
  }

  /* App iframe */
  .iphone-screen iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── Dynamic Island ── */
  .dynamic-island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 136px;
    height: 40px;
    background: #000;
    border-radius: 22px;
    z-index: 15;
    /* clear pill outline so it pops against any background */
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.14),
      0 2px 12px rgba(0,0,0,0.9),
      inset 0 1px 0 rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
  }

  /* FaceID / proximity sensor — small green dot */
  .di-sensor {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #1aff6a, #0a4a22);
    box-shadow: 0 0 6px rgba(26,255,106,0.5);
  }

  /* Camera lens */
  .di-camera {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a2a2e, #0a0a0c);
    border: 1.5px solid #222;
    box-shadow:
      inset 0 0 4px rgba(0,0,0,0.8),
      0 0 0 2px rgba(255,255,255,0.04);
    position: relative;
  }
  /* lens glint */
  .di-camera::before {
    content: '';
    position: absolute;
    top: 2px; left: 3px;
    width: 4px; height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
  }

  /* ── Status bar ── */
  .status-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 62px;
    z-index: 14;
    display: flex;
    align-items: flex-start;
    padding: 16px 28px 0 26px;
    justify-content: space-between;
    pointer-events: none;
  }

  .sb-time {
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: rgba(255,255,255,0.92);
    letter-spacing: -0.2px;
    line-height: 1;
  }

  .sb-icons {
    display: flex;
    align-items: center;
    gap: 7px;
    padding-top: 1px;
  }
  .sb-icons svg { fill: rgba(255,255,255,0.92); }

  /* ── Hardware buttons ── */
  .btn-side {
    position: absolute;
    background: linear-gradient(to right, #3a3a3a, #4a4a4a);
    border-radius: 3px;
  }

  .btn-power {
    right: -6px;
    top: 190px;
    width: 4px;
    height: 90px;
    border-radius: 0 3px 3px 0;
    box-shadow: 2px 0 6px rgba(0,0,0,0.5);
  }
  .btn-vol-up {
    left: -6px;
    top: 158px;
    width: 4px;
    height: 56px;
    border-radius: 3px 0 0 3px;
    box-shadow: -2px 0 6px rgba(0,0,0,0.5);
  }
  .btn-vol-down {
    left: -6px;
    top: 228px;
    width: 4px;
    height: 56px;
    border-radius: 3px 0 0 3px;
    box-shadow: -2px 0 6px rgba(0,0,0,0.5);
  }
  .btn-mute {
    left: -6px;
    top: 110px;
    width: 4px;
    height: 36px;
    border-radius: 3px 0 0 3px;
    box-shadow: -2px 0 6px rgba(0,0,0,0.5);
  }

  /* ── Home indicator ── */
  .home-indicator {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 148px;
    height: 5px;
    background: rgba(255,255,255,0.28);
    border-radius: 3px;
    z-index: 15;
  }

  /* ── Responsive scaling ── */
  @media (max-height: 1060px) {
    .iphone-wrap { transform: scale(0.9); transform-origin: top center; margin-bottom: -94px; }
  }
  @media (max-height: 960px) {
    .iphone-wrap { transform: scale(0.78); transform-origin: top center; margin-bottom: -212px; }
  }
  @media (max-height: 820px) {
    .iphone-wrap { transform: scale(0.65); transform-origin: top center; margin-bottom: -334px; }
  }
  @media (max-width: 480px) {
    .iphone-wrap { transform: scale(0.72); transform-origin: top center; margin-bottom: -260px; }
  }
</style>
</head>
<body>

  <p class="label-top">DISTORT <em>NOISE</em></p>

  <div class="iphone-wrap">
    <div class="iphone">
      <!-- Hardware buttons sit outside the screen overflow -->
      <div class="btn-side btn-mute"></div>
      <div class="btn-side btn-vol-up"></div>
      <div class="btn-side btn-vol-down"></div>
      <div class="btn-side btn-power"></div>

      <div class="iphone-screen">
        <!-- Status bar -->
        <div class="status-bar">
          <span class="sb-time">9:41</span>
          <div class="sb-icons">
            <!-- Signal bars -->
            <svg width="18" height="13" viewBox="0 0 18 13">
              <rect x="0"   y="9"   width="3.2" height="4"   rx="1"/>
              <rect x="4.8" y="6.2" width="3.2" height="6.8" rx="1"/>
              <rect x="9.6" y="3.4" width="3.2" height="9.6" rx="1"/>
              <rect x="14.4" y="0" width="3.2" height="13"  rx="1"/>
            </svg>
            <!-- WiFi -->
            <svg width="16" height="12" viewBox="0 0 16 12">
              <circle cx="8" cy="11" r="1.5"/>
              <path d="M4.2 7.6A5.2 5.2 0 018 6a5.2 5.2 0 013.8 1.6l1.5-1.5A7.3 7.3 0 008 4a7.3 7.3 0 00-5.3 2.1l1.5 1.5z" opacity="0.85"/>
              <path d="M1 4.4A9.8 9.8 0 018 2a9.8 9.8 0 017 2.4l-1.5 1.5A7.7 7.7 0 008 3.8a7.7 7.7 0 00-5.5 2.1L1 4.4z" opacity="0.55"/>
            </svg>
            <!-- Battery -->
            <svg width="26" height="13" viewBox="0 0 26 13">
              <rect x="0" y="1.5" width="22" height="10" rx="3.2" stroke="rgba(255,255,255,0.92)" stroke-width="1.2" fill="none"/>
              <rect x="22.5" y="4" width="2.5" height="5" rx="1.2" fill="rgba(255,255,255,0.92)"/>
              <rect x="1.5" y="3" width="17" height="7" rx="2" fill="rgba(255,255,255,0.92)"/>
            </svg>
          </div>
        </div>

        <!-- Dynamic Island -->
        <div class="dynamic-island">
          <div class="di-sensor"></div>
          <div class="di-camera"></div>
        </div>

        <!-- App -->
        <iframe
          src="distort-noise-mobile.html"
          title="DISTORT NOISE App"
          scrolling="no"
          allowfullscreen
        ></iframe>
      </div>

      <!-- Home indicator -->
      <div class="home-indicator"></div>
    </div>
  </div>

  <p class="label-bottom">iPhone 15 &nbsp;·&nbsp; iOS 17 &nbsp;·&nbsp; UX/UI Design</p>

</body>
</html>
